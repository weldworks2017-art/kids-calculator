  :root {
    --bg1:#e3d0ff; --bg2:#ffd6f2; --bg3:#d0f0ff;
    --purple:#b06ad6; --purple-d:#8a5cc0; --pink:#ff6fb5; --teal:#00b0a0;
    --text:#6a4a8a;
    --cup-bg: rgba(255, 255, 255, 0.55);
    --cup-border: #cf9bff;
    --secondary: #00b0a0;
    --shadow-color:#ecd0ff;
  }

  * { box-sizing: border-box; font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', 'Rounded Mplus 1c', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
  html { overflow-x: hidden; }

  body {
    margin: 0; padding: 0; color: var(--text); overflow-x: hidden;
    display: flex; flex-direction: column; min-height: 100vh;
    background:
      radial-gradient(circle at 18% 10%, #fff 2px, transparent 3px),
      radial-gradient(circle at 80% 8%, #fff 2.5px, transparent 3.5px),
      radial-gradient(circle at 62% 16%, #fff5ff 2px, transparent 3px),
      radial-gradient(circle at 30% 40%, #ffffff 1.5px, transparent 2.5px),
      linear-gradient(170deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
    background-attachment: fixed;
  }

  /* Header */
  .header {
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 12px; position: relative; z-index: 10; flex-wrap: wrap; gap: 10px;
  }
  @media (min-width: 768px) {
    .header { flex-direction: row; justify-content: space-between; padding: 14px 20px; }
  }
  .budget-input {
    display: flex; align-items: center; gap: 7px; font-size: 1rem; font-weight: 900;
    white-space: nowrap; color: var(--purple-d);
    background: rgba(255,255,255,0.85); border: 4px solid #e0b3ff; border-radius: 22px;
    padding: 5px 12px; box-shadow: 0 5px 0 var(--shadow-color);
  }
  .budget-input input {
    font-size: 1.15rem; padding: 4px; width: 62px; border: 3px solid #e0b3ff;
    border-radius: 12px; text-align: center; font-weight: 900;
    background: white; color: var(--pink);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
  }
  .mode-toggle {
    display: flex; gap: 6px; white-space: nowrap; flex-shrink: 0;
  }
  .mode-toggle button {
    border: none; padding: 7px 14px; font-size: 0.95rem; font-weight: 900; cursor: pointer;
    background: rgba(255,255,255,0.85); color: #c3a6dd; transition: 0.25s;
    border-radius: 18px; box-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }
  .mode-toggle button.active {
    background: linear-gradient(#f7a8e0, #c17ee0); color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15); box-shadow: 0 4px 0 #a86ac8;
  }

  /* にじ decoration */
  .rainbow { position:absolute; top:8px; right:0; width:132px; height:70px; overflow:hidden; opacity:.5; pointer-events:none; z-index:1; }
  .rainbow div { position:absolute; border-radius:50%; border-style:solid; border-bottom:none; left:0; }
  .rb1{width:150px;height:150px;border-width:9px;border-color:#ff9bce}
  .rb2{width:132px;height:132px;top:9px;left:9px;border-width:9px;border-color:#ffd36b}
  .rb3{width:114px;height:114px;top:18px;left:18px;border-width:9px;border-color:#9be8b0}
  .rb4{width:96px;height:96px;top:27px;left:27px;border-width:9px;border-color:#8fc7ff}

  /* Main Layout */
  .content { display: flex; flex: 1; flex-direction: column; overflow-y: auto; min-width: 0; }

  .visual-area {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 28px 20px 20px; position: relative;
    min-height: auto; height: auto; flex-shrink: 0;
  }

  .controls-area {
    display: flex; flex-direction: column; background: rgba(255,255,255,0.92);
    border-radius: 34px 34px 0 0;
    box-shadow: 0 -6px 0 #f0d6ff, 0 -12px 25px rgba(150,100,200,0.06);
    flex-shrink: 0;
  }

  @media (min-width: 768px) {
    .content { flex-direction: row; height: calc(100vh - 74px); overflow: hidden; }
    .visual-area { flex: 1.2; height: 100%; min-height: auto; display: flex; flex-direction: column; justify-content: flex-end; flex-shrink: 1; }
    .controls-area { flex: 1; height: 100%; border-radius: 34px 0 0 34px; box-shadow: -6px 0 0 #f0d6ff, -12px 0 25px rgba(150,100,200,0.06); overflow: hidden; flex-shrink: 1; }
  }

  /* Visual Container (Cup / Blocks) */
  .container-wrapper {
    position: relative; width: 200px; height: 430px; display: flex; align-items: flex-end;
    margin-bottom: 15px;
  }
  /* まほうのポーション瓶 */
  .cup {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border: 8px solid var(--cup-border); border-top: none;
    border-radius: 22px 22px 60px 60px; background: var(--cup-bg);
    display: flex; flex-direction: column-reverse; overflow: visible;
    box-shadow: inset 0 -12px 24px rgba(207,155,255,0.18), 0 8px 20px rgba(150,100,200,0.16);
  }
  .cup::after {
    content:'✦'; position:absolute; top:16px; right:18px; color:#fff; font-size:1.4rem;
    opacity:.9; z-index:6; text-shadow:0 0 8px #ffd36b;
  }
  .cup .item-fill:first-child { border-radius: 0 0 50px 50px; }

  .blocks {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column-reverse; align-items: center;
  }
  /* よさんライン（ここまで積めるよの目印） */
  .blocks::before {
    content: 'ここまで'; position: absolute; top: -4px; left: -10px; width: calc(100% + 20px);
    border-top: 4px dashed #ff9bce; color: #ff8fc0;
    font-size: 0.85rem; font-weight: 900; text-align: right; padding-top: 4px;
    pointer-events: none; z-index: 2;
  }
  /* お菓子をのせるおさら */
  .blocks::after {
    content: ''; position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
    width: 175px; height: 22px;
    background: linear-gradient(#ffffff, #e8d5ff);
    border-radius: 50%; pointer-events: none; z-index: 5;
    box-shadow: 0 5px 0 #d5b8f0, 0 8px 12px rgba(150,100,200,0.15);
  }

  .item-fill {
    width: 100%; transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; justify-content: center; align-items: center;
    color: white; font-weight: 900; font-size: 1.3rem; text-shadow: 0 2px 4px rgba(0,0,0,0.28);
  }
  .blocks .item-fill {
    width: 86%; margin-bottom: 2px; min-height: 26px;
    z-index: 10; position: relative;
    background-repeat: no-repeat; background-position: center bottom; background-size: contain;
    filter: drop-shadow(0 4px 3px rgba(150,100,200,0.25));
  }
  .snack-amount {
    position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.94); color: var(--purple-d);
    border: 2px solid #f0d6ff; border-radius: 12px;
    font-size: 0.85rem; font-weight: 900; padding: 1px 8px;
    box-shadow: 0 2px 0 #f0d6ff; line-height: 1.4;
  }

  /* コップ用の液体とうねうね波 */
  .cup .item-fill {
    position: relative; overflow: visible; margin-bottom: 0; border-radius: 0;
    border-top: 2px solid rgba(255,255,255,0.5);
  }
  .cup .item-fill::before {
    content: ''; position: absolute; top: -6px; left: 0; width: 100%; height: 12px;
    background: inherit; border-radius: 50% 50% 0 0; opacity: 0.85;
    animation: wave 2s infinite ease-in-out alternate;
  }
  @keyframes wave {
    0% { transform: scaleY(0.8) translateY(2px); }
    100% { transform: scaleY(1.2) translateY(-2px); }
  }

  /* CAUTION */
  .caution-overlay {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #ff6fb5, #c17ee0);
    color: white; padding: 8px 24px; border-radius: 25px;
    font-weight: 900; font-size: 1.35rem; display: none; white-space: nowrap;
    box-shadow: 0 6px 0 #b06ad6, 0 10px 20px rgba(176, 106, 214, 0.4);
    z-index: 20; animation: bounce 1.2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -10px); }
  }

  /* Particles */
  .particle { position: absolute; pointer-events: none; z-index: 100;
    animation: particle-fly 1.2s forwards cubic-bezier(0.1, 0.8, 0.3, 1); }
  @keyframes particle-fly {
    0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
    15% { opacity: 1; transform: translate(var(--dx), var(--dy)) scale(1) rotate(45deg); }
    100% { transform: translate(calc(var(--dx) * 1.5), calc(var(--dy) * 1.8 + 100px)) scale(0) rotate(180deg); opacity: 0; }
  }

  /* ごうけい / のこり */
  .total-label {
    width: 100%; text-align: center; margin-bottom: 4px; font-weight: 900;
    color: var(--purple-d); font-size: 1.3rem;
  }
  .total-label span { font-size: 1.8rem; color: var(--pink); }
  .remain-pill {
    margin: 6px auto 12px; background: rgba(255,255,255,0.9); color: var(--teal);
    font-weight: 900; padding: 6px 20px; border-radius: 20px;
    box-shadow: 0 4px 0 #b3f0e8; font-size: 1.15rem; text-align: center; white-space: nowrap;
  }

  /* Coins Display */
  .coins-display {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    padding: 12px; min-height: 62px; width: 100%; background: rgba(255,255,255,0.7);
    border-radius: 20px; box-shadow: inset 0 3px 6px rgba(150,100,200,0.05);
    border: 2px dashed #e0b3ff;
  }
  .coin {
    width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-weight: 900; font-size: 0.95rem;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12), inset 0 2px 0 rgba(255,255,255,0.5);
    position: relative; border: 2px solid;
  }
  .coin-100 { background: linear-gradient(135deg, #f6f0ff, #dcd0f0); color: #7a5cc0; border-color: #c3a6dd; }
  .coin-50 { background: linear-gradient(135deg, #fff2b3, #ffd36b); color: #c0392b; border-color: #e0b83f; }
  .coin-10 { background: linear-gradient(135deg, #ffc6e6, #ff9bce); color: white; text-shadow: 0 1px 1px #cf6a87; border-color: #e06fa8; }

  /* Numpad and Current Input */
  .input-display {
    text-align: center; font-size: 3.5rem; font-weight: 900; color: var(--purple);
    padding: 14px; min-height: 76px; line-height: 50px; border-bottom: 3px dashed #e0b3ff;
  }

  /* モバイル優先：デフォルトは縦積み（履歴の下にテンキー）。768px以上でのみ横並び */
  .controls-split { display: flex; flex-direction: column; flex: 1; min-width: 0; }

  /* History List */
  .history-list {
    flex: 1; overflow-y: auto; padding: 12px; min-width: 0;
    max-height: 200px; border-bottom: 3px dashed #e0b3ff;
  }
  @media (min-width: 768px) {
    .controls-split { flex-direction: row; }
    .history-list { max-height: none; border-bottom: none; border-right: 3px dashed #e0b3ff; }
  }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; background: white; border-radius: 16px; font-weight: 900; font-size: 1.2rem;
    box-shadow: 0 4px 0 #f0d6ff, 0 6px 10px rgba(150,100,200,0.04); margin-bottom: 10px;
    border: 2px solid #f6ecff; color: var(--purple-d);
  }
  .btn-delete {
    background: linear-gradient(#ffb3d9, #ff8fc0); color: white; border: none; border-radius: 12px;
    padding: 6px 14px; font-size: 0.9rem; font-weight: 900; cursor: pointer;
    box-shadow: 0 3px 0 #e06fa8; transition: transform 0.1s;
  }
  .btn-delete:active { transform: translateY(3px); box-shadow: none; }
  .color-dot { width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin-right: 10px; border: 2px solid rgba(255,255,255,0.5); }

  /* Numpad */
  .numpad {
    flex: 1.2; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 9px; padding: 15px;
    background: transparent; align-content: start;
  }
  .btn {
    border: none; border-radius: 18px; font-size: 1.55rem; font-weight: 900;
    color: #fff; cursor: pointer; padding: 12px 0;
    background: linear-gradient(160deg, #e6b3ff, #c58ee6); box-shadow: 0 6px 0 #a878c8;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #a878c8; }
  .btn-clear { background: linear-gradient(160deg, #ffb3d9, #ff8fc0); box-shadow: 0 6px 0 #e06fa8; font-size: 1.05rem; }
  .btn-clear:active { box-shadow: 0 0px 0 #e06fa8; }
  .btn-bs { background: linear-gradient(160deg, #ffe08a, #ffcf5a); color: #8a5a00; box-shadow: 0 6px 0 #e0b040; font-size: 1.05rem; }
  .btn-bs:active { box-shadow: 0 0px 0 #e0b040; }
  .btn-add {
    grid-column: span 3; background: linear-gradient(90deg, #ff9bce, #c17ee0, #7fb8ff);
    color: white; box-shadow: 0 6px 0 #b06ad6; padding: 16px 0; font-size: 1.7rem;
    letter-spacing: 2px; text-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .btn-add:active { box-shadow: 0 0px 0 #b06ad6; }

  /* おかしパレット（おかしモードのときだけ表示） */
  .snack-palette {
    display: none; gap: 8px; padding: 12px 12px 6px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; flex-shrink: 0;
  }
  .snack-palette.show { display: flex; }
  .snack-btn {
    flex: 0 0 auto; width: 66px; border: 3px solid transparent; border-radius: 16px;
    background: white; box-shadow: 0 4px 0 #f0d6ff; padding: 6px 2px 4px;
    cursor: pointer; text-align: center; transition: transform 0.1s;
  }
  .snack-btn img { width: 40px; height: 40px; object-fit: contain; display: block; margin: 0 auto; }
  .snack-btn span { display: block; font-size: 0.7rem; font-weight: 900; color: var(--purple-d); white-space: nowrap; }
  .snack-btn.selected {
    border-color: #ff8fc0; background: #fff0f8;
    transform: translateY(2px); box-shadow: 0 2px 0 #e06fa8;
  }

  /* ばくはつ演出 */
  .boom-flash {
    position: absolute; top: 38%; left: 50%; font-size: 6rem; z-index: 120;
    pointer-events: none; animation: boom-pop 0.9s ease-out forwards;
  }
  @keyframes boom-pop {
    0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
    20%  { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
    60%  { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.9); opacity: 0; }
  }
  .shake-hard { animation: shake-hard 0.5s ease-in-out; }
  @keyframes shake-hard {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-8px, 4px); }
    40% { transform: translate(8px, -4px); }
    60% { transform: translate(-6px, -3px); }
    80% { transform: translate(6px, 3px); }
  }
</style>

<body>

<div class="rainbow"><div class="rb1"></div><div class="rb2"></div><div class="rb3"></div><div class="rb4"></div></div>

<div class="header">
  <div class="budget-input">
    よさん <input type="number" id="budgetInput" value="300" min="10" step="10"> えん
  </div>
  <div class="mode-toggle">
    <button id="btnCup" class="active">コップ</button>
    <button id="btnBlocks">おかし</button>
  </div>
</div>

<div class="content">
  <div class="visual-area">
    <div class="caution-overlay" id="cautionLabel">⚠️ オーバー！</div>
    <div class="container-wrapper" id="visualContainer">
      <!-- Items will be injected here -->
    </div>

    <div class="total-label">
      ごうけい <span id="totalLabel">0</span> えん
    </div>
    <div class="remain-pill" id="remainingLabel">
      あと 300 えん つかえるよ✨
    </div>
    <div class="coins-display" id="coinsDisplay">
      <!-- Coins will be injected here -->
    </div>
  </div>

  <div class="controls-area">
    <div class="snack-palette" id="snackPalette"></div>
    <div class="input-display"><span id="currentInput">0</span> えん</div>

    <div class="controls-split">
      <div class="history-list" id="historyList">
        <!-- History items -->
      </div>

      <div class="numpad">
        <button class="btn" onclick="num(1)">1</button>
        <button class="btn" onclick="num(2)">2</button>
        <button class="btn" onclick="num(3)">3</button>
        <button class="btn" onclick="num(4)">4</button>
        <button class="btn" onclick="num(5)">5</button>
        <button class="btn" onclick="num(6)">6</button>
        <button class="btn" onclick="num(7)">7</button>
        <button class="btn" onclick="num(8)">8</button>
        <button class="btn" onclick="num(9)">9</button>
        <button class="btn btn-clear" onclick="clearInput()">ぜんぶけす</button>
        <button class="btn" onclick="num(0)">0</button>
        <button class="btn btn-bs" onclick="backspaceInput()">1つけす ◀</button>
        <button class="btn btn-add" onclick="addItem()">ついか ✨</button>
      </div>
    </div>
  </div>
</div>

<script>
  // State
  let items = [];
  let currentVal = "0";
  let mode = "cup"; // "cup" or "blocks"
  let budget = 300;

  // ゆめかわパステル配色（アイテムの色）
  const colors = ["#c17ee0", "#7fb8ff", "#ff9bce", "#ffd36b", "#9be8b0", "#b06ad6", "#ff8fc0"];

  // おかし10種（おかしモードで積むお菓子）
  const SNACKS = [
    { key: 'choco',   name: 'チョコ' },
    { key: 'candy',   name: 'キャンディ' },
    { key: 'cookie',  name: 'クッキー' },
    { key: 'donut',   name: 'ドーナツ' },
    { key: 'cake',    name: 'ケーキ' },
    { key: 'gummy',   name: 'グミ' },
    { key: 'ice',     name: 'アイス' },
    { key: 'chips',   name: 'ポテチ' },
    { key: 'pudding', name: 'プリン' },
    { key: 'macaron', name: 'マカロン' },
  ];
  let selectedSnack = 0;

  // Elements
  const budgetInput = document.getElementById('budgetInput');
  const btnCup = document.getElementById('btnCup');
  const btnBlocks = document.getElementById('btnBlocks');
  const visualContainer = document.getElementById('visualContainer');
  const cautionLabel = document.getElementById('cautionLabel');
  const coinsDisplay = document.getElementById('coinsDisplay');
  const totalLabel = document.getElementById('totalLabel');
  const remainingLabel = document.getElementById('remainingLabel');
  const currentInputEl = document.getElementById('currentInput');
  const historyList = document.getElementById('historyList');
  const snackPalette = document.getElementById('snackPalette');

  // ===== 自動保存（localStorage）：閉じても続きから使える =====
  const STORE_KEY = 'kaimono_calc_v1';
  function saveState() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({ items, budget, mode, selectedSnack }));
    } catch (e) { /* プライベートモード等では黙って無視 */ }
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (Array.isArray(data.items)) items = data.items;
      if (typeof data.budget === 'number' && data.budget > 0) budget = data.budget;
      if (data.mode === 'cup' || data.mode === 'blocks') mode = data.mode;
      if (typeof data.selectedSnack === 'number' && data.selectedSnack >= 0 && data.selectedSnack < SNACKS.length) selectedSnack = data.selectedSnack;
    } catch (e) { /* 壊れていたら無視 */ }
  }
  loadState();

  // URLのクエリパラメータ「?budget=500」などからよさん（budget）を読み込む（保存値より優先）
  const urlParams = new URLSearchParams(window.location.search);
  const paramBudget = urlParams.get('budget');
  if (paramBudget) {
    const parsedBudget = parseInt(paramBudget);
    if (!isNaN(parsedBudget) && parsedBudget > 0) {
      budget = parsedBudget;
    }
  }
  // 復元した値をUIへ反映
  budgetInput.value = budget;
  if (mode === 'blocks') { btnBlocks.classList.add('active'); btnCup.classList.remove('active'); }
  else { btnCup.classList.add('active'); btnBlocks.classList.remove('active'); }

  // おかしパレットを組み立て（10種から選ぶ→えらんだお菓子が積まれる）
  SNACKS.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'snack-btn';
    b.innerHTML = `<img src="snacks/${s.key}.png" alt="${s.name}"><span>${s.name}</span>`;
    b.addEventListener('click', () => {
      selectedSnack = i;
      updatePalette();
      initAudio();
      playSound('add-blocks');
      saveState();
    });
    snackPalette.appendChild(b);
  });
  function updatePalette() {
    [...snackPalette.children].forEach((el, i) => el.classList.toggle('selected', i === selectedSnack));
  }
  updatePalette();

  function snackKeyOf(item, idx) {
    return item.snack || SNACKS[idx % SNACKS.length].key;
  }

  // Audio Context (Initialize on first touch to bypass autoplay restrictions)
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }
  document.body.addEventListener('touchstart', initAudio, {once:true});
  document.body.addEventListener('mousedown', initAudio, {once:true});

  function playSound(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }

    const playNote = (freq, duration, typeOfOsc = 'sine', delay = 0) => {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.type = typeOfOsc;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime + delay);
      gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + delay + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
      osc.start(audioCtx.currentTime + delay);
      osc.stop(audioCtx.currentTime + delay + duration);
    };

    if (type === 'add-cup') {
      playNote(523.25, 0.12, 'sine', 0);
      playNote(659.25, 0.12, 'sine', 0.03);
      playNote(783.99, 0.18, 'sine', 0.06);
    } else if (type === 'add-blocks') {
      playNote(587.33, 0.08, 'triangle', 0);
      playNote(880.00, 0.08, 'triangle', 0.02);
    } else if (type === 'delete') {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode); gainNode.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(392.00, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(130.81, audioCtx.currentTime + 0.15);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'boom') {
      // ばくはつ音（ノイズバースト＋低音の落下）
      const bufferSize = Math.floor(audioCtx.sampleRate * 0.4);
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) { data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2); }
      const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
      const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1200, audioCtx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.35);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.5, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
      noise.start();
      const osc = audioCtx.createOscillator();
      const og = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(160, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.35);
      og.gain.setValueAtTime(0.4, audioCtx.currentTime);
      og.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.connect(og); og.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'error') {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode); gainNode.connect(audioCtx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.quadraticRampToValueAtTime(440, audioCtx.currentTime + 0.15);
      osc.frequency.linearRampToValueAtTime(180, audioCtx.currentTime + 0.35);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
  }

  // Particle Generation for Overflow Celebration/Alert
  function createParticles(x, y, count = 15, isStar = false) {
    for (let i = 0; i < count; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const angle = Math.random() * Math.PI * 2;
      const velocity = 40 + Math.random() * 90;
      const dx = Math.cos(angle) * velocity;
      const dy = Math.sin(angle) * velocity - 60;
      particle.style.setProperty('--dx', `${dx}px`);
      particle.style.setProperty('--dy', `${dy}px`);
      const size = 12 + Math.random() * 14;
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${x}px`;
      particle.style.top = `${y}px`;
      if (isStar) {
        particle.style.background = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23feca57"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>') no-repeat center/contain`;
      } else {
        const bubbleColors = ['#c17ee0', '#7fb8ff', '#ff9bce', '#ffd36b', '#9be8b0', '#b06ad6'];
        const randomColor = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
        particle.style.backgroundColor = randomColor;
        particle.style.borderRadius = '50%';
        particle.style.border = '2px solid rgba(255,255,255,0.7)';
      }
      visualContainer.appendChild(particle);
      setTimeout(() => { particle.remove(); }, 1200);
    }
  }

  // Small rising bubbles animation inside cup
  function createBubblesInCup() {
    const cupEl = document.querySelector('.cup');
    if (!cupEl) return;
    for (let i = 0; i < 6; i++) {
      const bubble = document.createElement('div');
      bubble.style.position = 'absolute';
      bubble.style.bottom = '10px';
      bubble.style.left = `${10 + Math.random() * 180}px`;
      bubble.style.width = '8px';
      bubble.style.height = '8px';
      bubble.style.borderRadius = '50%';
      bubble.style.backgroundColor = 'rgba(255,255,255,0.6)';
      bubble.style.border = '1px solid rgba(255,255,255,0.8)';
      bubble.style.pointerEvents = 'none';
      bubble.style.zIndex = '12';
      bubble.animate([
        { transform: 'translateY(0) scale(0.8)', opacity: 0.8 },
        { transform: 'translateY(-350px) scale(1.4)', opacity: 0 }
      ], { duration: 800 + Math.random() * 800, easing: 'ease-out' });
      cupEl.appendChild(bubble);
      setTimeout(() => bubble.remove(), 1600);
    }
  }

  // よさんオーバーでお菓子タワーがばくはつする演出（おかしモード）
  function explodeSnacks() {
    const wrapper = visualContainer.querySelector('.blocks');
    if (!wrapper) return;
    playSound('boom');
    // 💥フラッシュ
    const boom = document.createElement('div');
    boom.className = 'boom-flash';
    boom.innerText = '💥';
    visualContainer.appendChild(boom);
    setTimeout(() => boom.remove(), 900);
    // 画面ゆれ
    visualContainer.classList.add('shake-hard');
    setTimeout(() => visualContainer.classList.remove('shake-hard'), 600);
    // お菓子が四方八方に吹き飛ぶ
    wrapper.querySelectorAll('.item-fill').forEach(el => {
      const dx = (Math.random() - 0.5) * 520;
      const dy = -(80 + Math.random() * 360);
      const rot = (Math.random() - 0.5) * 720;
      el.animate([
        { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg)`, opacity: 0 }
      ], { duration: 700 + Math.random() * 300, easing: 'cubic-bezier(0.2, 0.6, 0.4, 1)', fill: 'forwards' });
    });
    createParticles(100, 200, 20, true);
    // ばくはつが終わったら積み直して見せる（けす操作ができるように）
    setTimeout(() => render(), 1100);
  }

  // Events
  budgetInput.addEventListener('change', (e) => {
    budget = parseInt(e.target.value) || 300;
    saveState();
    render();
  });

  btnCup.addEventListener('click', () => { mode = 'cup'; btnCup.classList.add('active'); btnBlocks.classList.remove('active'); saveState(); render(); });
  btnBlocks.addEventListener('click', () => { mode = 'blocks'; btnBlocks.classList.add('active'); btnCup.classList.remove('active'); saveState(); render(); });

  function num(n) {
    if (currentVal === "0") currentVal = n.toString();
    else currentVal += n;
    if (currentVal.length > 4) currentVal = currentVal.slice(0,4);
    updateInputDisplay();
    initAudio();
  }

  function clearInput() {
    currentVal = "0";
    updateInputDisplay();
    playSound('delete');
  }

  function backspaceInput() {
    if (currentVal.length > 1) { currentVal = currentVal.slice(0, -1); }
    else { currentVal = "0"; }
    updateInputDisplay();
    playSound('delete');
  }

  document.addEventListener('keydown', (e) => {
    if (document.activeElement.tagName === 'INPUT') return;
    if (e.key >= '0' && e.key <= '9') { num(parseInt(e.key)); }
    else if (e.key === 'Backspace') { backspaceInput(); }
    else if (e.key === 'Escape' || e.key === 'Delete') { clearInput(); }
    else if (e.key === 'Enter') { addItem(); }
  });

  function updateInputDisplay() {
    currentInputEl.innerText = currentVal;
  }

  function addItem() {
    const val = parseInt(currentVal);
    if (val > 0) {
      items.push({ id: Date.now(), amount: val, color: colors[items.length % colors.length], snack: SNACKS[selectedSnack].key });
      currentVal = "0";
      updateInputDisplay();
      const total = items.reduce((sum, item) => sum + item.amount, 0);
      setTimeout(() => {
        if (total > budget) {
          if (mode === 'blocks') { explodeSnacks(); return; }
          playSound('error');
          createParticles(100, 10, 16, false);
        } else {
          playSound(mode === 'cup' ? 'add-cup' : 'add-blocks');
          if (mode === 'cup') { createBubblesInCup(); }
          else { createParticles(100, 200, 6, true); }
        }
      }, 50);
      saveState();
      render();
    }
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    playSound('delete');
    saveState();
    render();
  }

  function render() {
    const total = items.reduce((sum, item) => sum + item.amount, 0);
    totalLabel.innerText = total;

    if (total <= budget) {
      remainingLabel.innerText = "あと " + (budget - total) + " えん つかえるよ✨";
      remainingLabel.style.color = "var(--teal)";
    } else {
      remainingLabel.innerText = (total - budget) + " えん おーばー！";
      remainingLabel.style.color = "var(--pink)";
    }

    visualContainer.innerHTML = '';
    visualContainer.className = 'container-wrapper';
    const wrapper = document.createElement('div');
    wrapper.className = mode;

    if (total > budget) { cautionLabel.style.display = 'block'; }
    else { cautionLabel.style.display = 'none'; }

    snackPalette.classList.toggle('show', mode === 'blocks');

    items.forEach((item, idx) => {
      const pct = (item.amount / budget) * 100;
      const div = document.createElement('div');
      div.className = 'item-fill';
      div.style.height = pct + '%';
      if (mode === 'blocks') {
        div.style.backgroundImage = "url('snacks/" + snackKeyOf(item, idx) + ".png')";
        const label = document.createElement('span');
        label.className = 'snack-amount';
        label.innerText = item.amount;
        div.appendChild(label);
      } else {
        div.style.backgroundColor = item.color;
        if (pct > 8) { div.innerText = item.amount; }
      }
      wrapper.appendChild(div);
    });
    visualContainer.appendChild(wrapper);

    coinsDisplay.innerHTML = '';
    let remaining = total;
    const c100 = Math.floor(remaining / 100); remaining %= 100;
    const c50 = Math.floor(remaining / 50); remaining %= 50;
    const c10 = Math.floor(remaining / 10);
    for(let i=0; i<c100; i++) { const c = document.createElement('div'); c.className = 'coin coin-100'; c.innerText = '100'; coinsDisplay.appendChild(c); }
    for(let i=0; i<c50; i++) { const c = document.createElement('div'); c.className = 'coin coin-50'; c.innerText = '50'; coinsDisplay.appendChild(c); }
    for(let i=0; i<c10; i++) { const c = document.createElement('div'); c.className = 'coin coin-10'; c.innerText = '10'; coinsDisplay.appendChild(c); }

    historyList.innerHTML = '';
    items.slice().reverse().forEach(item => {
      const el = document.createElement('div');
      el.className = 'history-item';
      const s = item.snack ? SNACKS.find(x => x.key === item.snack) : null;
      const iconHtml = s
        ? `<img src="snacks/${s.key}.png" alt="" style="width:30px;height:30px;object-fit:contain;margin-right:10px">`
        : `<span class="color-dot" style="background:${item.color}"></span>`;
      const nameHtml = s ? `<span style="font-size:0.95rem;margin-right:8px">${s.name}</span>` : '';
      el.innerHTML = `
        <div style="display:flex; align-items:center;">
          ${iconHtml}
          ${nameHtml}${item.amount} えん
        </div>
        <button class="btn-delete" onclick="deleteItem(${item.id})">けす</button>
      `;
      historyList.appendChild(el);
    });
  }

  // Initial render
  render();

  // ===== Service Worker（オフライン動作。公開URL上でのみ有効） =====
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => { /* ローカル単体ファイル時は無視 */ });
    });
  }
</script>
</body>
</html>
